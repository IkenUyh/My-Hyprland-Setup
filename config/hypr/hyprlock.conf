# =========================================
# 1. ĐỒNG HỒ KHỔNG LỒ (Bỏ AM/PM, size 173)
# =========================================
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')" 
    color = rgba(220, 225, 230, 0.6)
    font_size = 173
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -100
    halign = center
    valign = top
}

# =========================================
# 2. CHỮ CHẠY (Size 65 to rõ hơn)
# =========================================
label {
    monitor =
    text = cmd[update:100] $HOME/.config/hypr/scripts/typing.sh
    color = rgba(220, 225, 230, 0.9)
    font_size = 65
    font_family = VT323
    position = 0, -80
    halign = center
    valign = center
    shadow_passes = 1
}

# =========================================
# 3. AVATAR & MẬT KHẨU (Né chữ English US)
# =========================================
# Khung Avatar
image {
    monitor =
    path = $HOME/.config/hypr/avatar.png
    size = 120
    border_size = 2
    border_color = rgba(220, 225, 230, 0.5)
    rounding = -1
    # Kéo lên vị trí 180 để cách xa đáy màn hình
    position = 0, 180
    halign = center
    valign = bottom
}

# Ô mật khẩu
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(220, 225, 230, 0.3)
    inner_color = rgba(0, 0, 0, 0)
    font_color = rgba(220, 225, 230, 0.9)
    fade_on_empty = true
    placeholder_text = 
    hide_input = false
    # Kéo lên vị trí 100, vừa đẹp nằm trên chữ English (US)
    position = 0, 100
    halign = center
    valign = bottom
}

# =========================================
# 4. NGÀY THÁNG (Góc phải, Thu nhỏ lại)
# =========================================
label {
    monitor =
    text = cmd[update:18000000] echo "<b> $(date +'%A, %-d %B') </b>"
    color = rgba(220, 225, 230, 0.85)
    font_size = 50
    font_family = Victor Mono Bold Italic
    # Hạ tọa độ Y xuống 60 cho đỡ lơ lửng
    position = -40, 60
    halign = right
    valign = bottom
}

# Keyboard LAYOUT
label {
    monitor =
    text = $LAYOUT
    color = $color8
    font_size = 19
    font_family = Victor Mono Bold Oblique
    position = 0, 53
    halign = center
    valign = bottom
}

# =========================================
# 5. UPTIME (Góc trái dưới cùng)
# =========================================
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p || $Scripts/UptimeNixOS.sh)" </b>"
    # Dùng màu xám mờ để nó chìm vào nền, không tranh spotlight
    color = rgba(220, 225, 230, 0.5)
    font_size = 20
    font_family = Victor Mono Bold Oblique
    # Đẩy sang mép trái (left), cách lề trái 40px, cách đáy 30px
    position = 40, 30
    halign = left
    valign = bottom
}
